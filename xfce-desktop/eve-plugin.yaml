api_version: eve.plugin/v1
kind: package
id: xfce-desktop
display_name: XFCE Desktop
commands:
  install: {exec: scripts/package-plugin, args: [xfce-desktop, install]}
  status: {exec: scripts/package-plugin, args: [xfce-desktop, status]}
  down: {exec: scripts/package-plugin, args: [xfce-desktop, down]}
supports: {os_families: [ubuntu]}
conflicts_with: [xfce-desktop-headless, gnome-desktop, gnome-desktop-headless, kde-desktop, kde-desktop-headless]
compatibility:
  - platform: ubuntu
    desktop: XFCE
    session: X11
    status: supported
    notes: Installs XFCE with LightDM autologin for a local graphical X11 session.
down: {destructive: true}
env: []
install:
  ubuntu:
    steps: [base.sh, timezone.sh, provision/ubuntu/xfce-desktop.sh]
bundles:
  - id: desktop-xfce
    includes: [xfce-desktop, rdp]
