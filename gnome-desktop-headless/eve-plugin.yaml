api_version: eve.plugin/v1
kind: package
id: gnome-desktop-headless
display_name: GNOME Desktop Headless
commands:
  install: {exec: scripts/package-plugin, args: [gnome-desktop-headless, install]}
  status: {exec: scripts/package-plugin, args: [gnome-desktop-headless, status]}
  down: {exec: scripts/package-plugin, args: [gnome-desktop-headless, down]}
supports: {os_families: [ubuntu]}
conflicts_with: [xfce-desktop, xfce-desktop-headless, gnome-desktop, kde-desktop, kde-desktop-headless]
compatibility:
  - platform: ubuntu
    desktop: GNOME Headless
    session: Wayland
    status: supported
    notes: Installs GNOME with GDM autologin and persistent Wayland virtual monitor setup.
down: {destructive: true}
env: [VIRTUAL_MONITOR_WIDTH, VIRTUAL_MONITOR_HEIGHT]
desktop:
  name: "GNOME Headless"
  session: "Wayland"
  headless: true
install:
  ubuntu:
    steps: [base.sh, timezone.sh, provision/ubuntu/gnome-desktop-headless.sh]
bundles:
  - id: desktop-gnome-headless
    includes: [gnome-desktop-headless, rdp]
