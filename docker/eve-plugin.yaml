api_version: eve.plugin/v1
kind: package
id: docker
display_name: Docker
commands:
  install: {exec: scripts/package-plugin, args: [docker, install]}
  status: {exec: scripts/package-plugin, args: [docker, status]}
  down: {exec: scripts/package-plugin, args: [docker, down]}
supports: {os_families: [ubuntu]}
down: {destructive: true}
env: []
vagrant:
  inline_provision:
    ubuntu: |
      # Install Docker
      sudo install -m 0755 -d /etc/apt/keyrings
      curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --batch --yes --dearmor -o /etc/apt/keyrings/docker.gpg
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
      sudo apt-get update -y
      sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin
      sudo usermod -aG docker vagrant
install:
  ubuntu:
    steps: [base.sh, timezone.sh, provision/ubuntu/docker.sh]
