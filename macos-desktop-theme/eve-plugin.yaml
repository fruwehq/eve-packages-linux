api_version: eve.plugin/v1
kind: package
id: macos-desktop-theme
display_name: macOS-like GNOME Theme
commands:
  install: {exec: scripts/package-plugin, args: [macos-desktop-theme, install]}
  status: {exec: scripts/package-plugin, args: [macos-desktop-theme, status]}
  down: {exec: scripts/package-plugin, args: [macos-desktop-theme, down]}
supports: {os_families: [ubuntu]}
compatibility:
  - platform: ubuntu
    desktop: GNOME
    session: Wayland
    status: wip
    notes: Theme layer on top of GNOME; remote access depends on the selected remote desktop package.
down: {destructive: true}
env: []
install:
  ubuntu:
    steps: [base.sh, timezone.sh, ../gnome-desktop/provision/ubuntu/gnome-desktop.sh, provision/ubuntu/macos-desktop-theme.sh]
    package_markers: [gnome-desktop, macos-desktop-theme]
