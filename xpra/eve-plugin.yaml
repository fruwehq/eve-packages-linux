api_version: eve.plugin/v1
kind: package
id: xpra
display_name: Xpra
commands:
  install: {exec: scripts/package-plugin, args: [xpra, install]}
  status: {exec: scripts/package-plugin, args: [xpra, status]}
  down: {exec: scripts/package-plugin, args: [xpra, down]}
supports:
  os_families: [ubuntu]
  arches: [amd64]
  ubuntu_versions: ["22.04", "24.04"]
compatibility_enforced: true
compatibility:
  - platform: ubuntu
    desktop: XFCE
    session: X11
    status: legacy
    notes: Limited to Ubuntu 22.04/24.04; not an Ubuntu 26 path.
  - platform: windows
    desktop: Windows
    session: Native
    status: wip
    notes: Available as an experimental package only.
down: {destructive: true}
env: []
actions:
  - id: xpra-desktop
    label: Xpra Desktop
    target: xpra.desktop
    exec: commands/xpra-launch
  - id: xpra-attach
    label: Xpra Attach
    target: xpra.attach
    exec: commands/xpra-launch
vagrant:
  port_forwards:
    - {guest: 14500, host: 14500}
install:
  ubuntu:
    steps: [base.sh, timezone.sh, provision/ubuntu/xpra.sh]
bundles:
  - id: remote-xpra
    includes: [xpra]
