api_version: eve.plugin/v1
kind: package
id: gnome-desktop
display_name: GNOME Desktop
commands:
  install:
    exec: scripts/package-plugin
    args:
    - gnome-desktop
    - install
  status:
    exec: scripts/package-plugin
    args:
    - gnome-desktop
    - status
  down:
    exec: scripts/package-plugin
    args:
    - gnome-desktop
    - down
supports:
  os_families:
  - ubuntu
conflicts_with:
- xfce-desktop
- xfce-desktop-headless
- gnome-desktop-headless
- kde-desktop
- kde-desktop-headless
compatibility:
- platform: ubuntu
  desktop: GNOME
  session: Wayland
  status: supported
  notes: Installs GNOME with GDM autologin for the local graphical session.
down:
  destructive: true
env: []
provides:
- session:wayland
desktop:
  name: GNOME
  session: Wayland
install:
  ubuntu:
    steps:
    - base.sh
    - timezone.sh
    - provision/ubuntu/gnome-desktop.sh
