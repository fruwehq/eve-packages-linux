api_version: eve.plugin/v1
kind: package
id: sunshine
display_name: Sunshine
commands:
  install: {exec: scripts/package-plugin, args: [sunshine, install]}
  status: {exec: scripts/package-plugin, args: [sunshine, status]}
  down: {exec: scripts/package-plugin, args: [sunshine, down]}
supports: {os_families: [ubuntu]}
config_schema:
  config:
    max_bitrate_kbps:
      type: integer
      env_var: SUNSHINE_MAX_BITRATE_KBPS
      description: "Maximum Sunshine host streaming bitrate, in kilobits per second."
    password:
      type: string
      env_var: EPHEMERAL_SUNSHINE_PASSWORD
      description: "Password for the Sunshine web UI / Moonlight pairing flow."
    version:
      type: string
      env_var: SUNSHINE_VERSION
      description: "Sunshine version to install (pinned)."
compatibility_enforced: true
compatibility:
  - platform: windows
    desktop: Windows
    session: Native
    status: supported
    notes: Uses Virtual Display Driver as the intended single Sunshine display.
  - platform: ubuntu
    desktop: XFCE
    session: X11
    status: wip
    notes: Current Linux path uses X11 capture; ultrawide 5120x1440 still needs live validation.
  - platform: ubuntu
    desktop: XFCE Headless
    session: X11
    status: wip
    notes: Current Linux path uses X11 capture; ultrawide 5120x1440 still needs live validation.
  - platform: ubuntu
    desktop: GNOME
    session: Wayland
    status: wip
    notes: Wayland capture is not the stable default path yet.
down: {destructive: true}
env: [EPHEMERAL_DISPLAY_FPS, EPHEMERAL_DISPLAY_RESOLUTION, EPHEMERAL_SUNSHINE_PASSWORD, SUNSHINE_VERSION, SUNSHINE_MAX_BITRATE_KBPS]
actions:
  - id: sunshine
    label: Sunshine
    target: sunshine.open
  - id: pair-moonlight
    label: Pair Moonlight
    target: moonlight.pair
  - id: moonlight
    label: Moonlight
    target: moonlight.open
install:
  ubuntu:
    steps: [base.sh, timezone.sh, provision/ubuntu/sunshine.sh]
bundles:
  - id: desktop-streaming
    includes: [sunshine, rustdesk, vnc, rdp, waypipe]
