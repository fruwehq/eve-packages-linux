api_version: eve.plugin/v1
kind: package
id: thinlinc
display_name: ThinLinc
commands:
  install: {exec: scripts/package-plugin, args: [thinlinc, install]}
  status: {exec: scripts/package-plugin, args: [thinlinc, status]}
  down: {exec: scripts/package-plugin, args: [thinlinc, down]}
supports:
  os_families: [ubuntu]
  arches: [amd64]
config_schema:
  config:
    accept_eula:
      type: boolean
      env_var: THINLINC_ACCEPT_EULA
      description: "Set to true to accept the ThinLinc server EULA during install."
    agent_hostname:
      type: string
      env_var: THINLINC_AGENT_HOSTNAME
      description: "Hostname the ThinLinc agent advertises to clients."
    server_bundle_path:
      type: path
      env_var: THINLINC_SERVER_BUNDLE_PATH
      description: "Local path to a downloaded ThinLinc server bundle."
    server_bundle_url:
      type: url
      env_var: THINLINC_SERVER_BUNDLE_URL
      description: "URL to download the ThinLinc server bundle from."
    webaccess_port:
      type: integer
      env_var: THINLINC_WEBACCESS_PORT
      description: "TCP port for ThinLinc Web Access."
compatibility_enforced: true
compatibility:
  - platform: ubuntu
    desktop: XFCE
    session: X11
    status: supported
    notes: Stable ThinLinc session path on amd64.
  - platform: ubuntu
    desktop: XFCE Headless
    session: X11
    status: supported
    notes: Stable ThinLinc session path on amd64 without a local display manager.
  - platform: ubuntu
    desktop: GNOME
    session: X11
    status: wip
    notes: GNOME can run as a ThinLinc X11 session, but this path still needs validation.
  - platform: ubuntu
    desktop: GNOME
    session: Wayland
    status: unsupported
    notes: ThinLinc serves X11 sessions, not the local GNOME Wayland compositor.
down: {destructive: true}
env: [THINLINC_ACCEPT_EULA, THINLINC_SERVER_BUNDLE_PATH, THINLINC_SERVER_BUNDLE_URL, THINLINC_WEBACCESS_PORT]
actions:
  - id: web
    label: ThinLinc Web
    target: thinlinc.web
  - id: client
    label: ThinLinc Client
    target: thinlinc.client
install:
  ubuntu:
    steps: [base.sh, timezone.sh, provision/ubuntu/thinlinc.sh]
